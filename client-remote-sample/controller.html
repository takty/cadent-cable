<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Remote Controller Sample</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="controller-page">
	<h1>Remote Controller</h1>

	<section class="panel">
		<div>Room ID: <code id="room-id">-</code></div>
		<div id="status" class="status"></div>
	</section>

	<section class="controller">
		<div class="dpad">
			<button id="btn-up" class="control-button dpad-up" type="button" disabled>↑</button>
			<button id="btn-left" class="control-button dpad-left" type="button" disabled>←</button>
			<button id="btn-right" class="control-button dpad-right" type="button" disabled>→</button>
			<button id="btn-down" class="control-button dpad-down" type="button" disabled>↓</button>
		</div>

		<div class="action-buttons">
			<button id="btn-b" class="control-button action-button" type="button" disabled>B</button>
			<button id="btn-a" class="control-button action-button" type="button" disabled>A</button>
		</div>
	</section>

	<script type="module" src="./controller.js"></script>
</body>
</html>
