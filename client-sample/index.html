<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Game Sample</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>Game Sample</h1>

	<section>
		<label>
			Display name
			<input id="display-name" value="Member" maxlength="32">
		</label>
		<label>
			Room ID
			<input id="room-id" placeholder="auto or existing room">
		</label>
		<label>
			Approval ratio
			<input id="approval-ratio" type="number" min="0" max="1" step="0.1" value="0">
		</label>
		<button id="create-room" type="button">Create room</button>
		<button id="join-room" type="button">Join room</button>
		<button id="leave-room" type="button" disabled>Leave</button>
	</section>

	<section>
		<div id="status"></div>
	</section>

	<section>
		<button id="tap-button" type="button" disabled>Tap</button>
	</section>

	<section>
		<h2>Member</h2>
		<div id="members"></div>
	</section>

	<section>
		<h2>Join requests</h2>
		<div id="requests"></div>
	</section>

	<script type="module" src="./dist/app.js"></script>
</body>
</html>
